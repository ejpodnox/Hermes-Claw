services:
  hermes:
    build:
      context: ./docker
      args:
        HERMES_VERSION: ${HERMES_VERSION:-v2026.4.30}
    image: local/hermes-ubuntu22-cuda:${HERMES_VERSION:-v2026.4.30}
    container_name: hermes-agent
    user: "0:0"
    working_dir: /workspace
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    shm_size: 1g
    pids_limit: 2048
    environment:
      HOME: /workspace
      HERMES_HOME: /workspace/.hermes
      XDG_CACHE_HOME: /workspace/.cache
      PLAYWRIGHT_BROWSERS_PATH: /opt/playwright
      TERM: xterm-256color
      TZ: ${TZ:-UTC}
    network_mode: host
    volumes:
      - .:/workspace
    command:
      - hermes
      - gateway
      - run
